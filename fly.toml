# Fly.io configuration for the Blis-Q Express API.
# primary_region = "waw" (Warsaw) is non-negotiable — lowest latency to the
# Polish user base. See CLAUDE.md "Production Infrastructure".

app = "blis-q"
primary_region = "waw"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "5000"

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    method = "GET"
    path = "/api/health"
    interval = "15s"
    timeout = "2s"
    grace_period = "10s"
