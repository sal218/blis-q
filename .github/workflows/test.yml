name: CI

on:
  pull_request:
    branches: ["**"]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fast-gate:
    name: Lint · Types · Unit · Client · Server Build
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/blisq_ci_placeholder
      SUPABASE_URL: https://placeholder.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
      SUPABASE_ANON_KEY: placeholder-anon-key-not-used-in-fast-gate
      SESSION_SECRET: ci-fast-gate-session-secret-at-least-32-chars
      RESEND_API_KEY: re_test_disabled
      INVITE_LINK_BASE: http://localhost:5000
      WEB_APP_URL: http://localhost:8081
      EXPO_PUBLIC_API_URL: http://localhost:5000
      FIREBASE_PROJECT_ID: test-project
      FIREBASE_CLIENT_EMAIL: test@test-project.iam.gserviceaccount.com
      FIREBASE_PRIVATE_KEY: "-----BEGIN RSA PRIVATE KEY-----\nMIIEowIBAAKCAQEA00000000000000000000000000000000000000000000000=\n-----END RSA PRIVATE KEY-----"
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        # --legacy-peer-deps until `npx expo install --fix` pins the exact Expo
        # SDK 54 RN peer set in Sprint 1 (e.g. react-native-screens vs RN). The
        # conflicts are version-range mismatches, not real incompatibilities.
        run: npm ci --legacy-peer-deps

      - name: Create .env.test
        run: |
          cat > .env.test << ENVEOF
          DATABASE_URL=${DATABASE_URL}
          SUPABASE_URL=${SUPABASE_URL}
          SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
          SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
          SESSION_SECRET=${SESSION_SECRET}
          RESEND_API_KEY=${RESEND_API_KEY}
          INVITE_LINK_BASE=${INVITE_LINK_BASE}
          WEB_APP_URL=${WEB_APP_URL}
          EXPO_PUBLIC_API_URL=${EXPO_PUBLIC_API_URL}
          FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
          FIREBASE_CLIENT_EMAIL=${FIREBASE_CLIENT_EMAIL}
          FIREBASE_PRIVATE_KEY=${FIREBASE_PRIVATE_KEY}
          ENVEOF

      - name: Audit dependencies
        run: npm audit --audit-level=high --omit=dev
        continue-on-error: true

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run check:types

      - name: Unit tests
        run: npm test

      - name: Client tests (jest-expo)
        run: npm run test:client

      - name: Server build
        run: npm run server:build

  integration-tests:
    name: Integration Tests (Jest + real DB)
    runs-on: ubuntu-latest
    needs: fast-gate
    if: "github.actor != 'dependabot[bot]' && !contains(github.event.head_commit.message, '[skip integration]') && !contains(github.event.pull_request.title, '[skip integration]')"
    # Runs against a LOCAL Postgres service container instead of the remote
    # Supabase test project. Every query hits localhost, so the ~cross-region
    # round-trip latency that made this job ~20 min is gone (it dominated the
    # wall-clock — the tests seed/clean up thousands of rows). It's a REAL
    # Postgres, so results stay real: identical SQL/constraint/RLS semantics, and
    # the tests use the service role (which bypasses RLS) exactly as against
    # Supabase. The schema is built fresh each run from shared/schema.ts. The DB
    # is ephemeral (a fresh container per run), so no data leaks between runs.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: blisq_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/blisq_test
      # Supabase is MOCKED in integration tests (jest.mock("../supabase")); these
      # are non-empty placeholders only, so env validation passes (like fast-gate).
      # No BLISQ_TEST_* secrets are needed anymore.
      SUPABASE_URL: https://placeholder.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
      SUPABASE_ANON_KEY: placeholder-anon-key-not-used-in-tests
      SESSION_SECRET: ci-test-session-secret-at-least-32-chars
      RESEND_API_KEY: re_test_disabled
      INVITE_LINK_BASE: http://localhost:5000
      WEB_APP_URL: http://localhost:8081
      EXPO_PUBLIC_API_URL: http://localhost:5000
      FIREBASE_PROJECT_ID: test-project
      FIREBASE_CLIENT_EMAIL: test@test-project.iam.gserviceaccount.com
      FIREBASE_PRIVATE_KEY: "-----BEGIN RSA PRIVATE KEY-----\nMIIEowIBAAKCAQEA00000000000000000000000000000000000000000000000=\n-----END RSA PRIVATE KEY-----"

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        # --legacy-peer-deps until `npx expo install --fix` pins the exact Expo
        # SDK 54 RN peer set (version-range mismatches, not real incompatibilities).
        run: npm ci --legacy-peer-deps

      - name: Create .env.test
        run: |
          cat > .env.test << ENVEOF
          DATABASE_URL=${DATABASE_URL}
          SUPABASE_URL=${SUPABASE_URL}
          SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
          SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
          SESSION_SECRET=${SESSION_SECRET}
          RESEND_API_KEY=${RESEND_API_KEY}
          INVITE_LINK_BASE=${INVITE_LINK_BASE}
          WEB_APP_URL=${WEB_APP_URL}
          EXPO_PUBLIC_API_URL=${EXPO_PUBLIC_API_URL}
          FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
          FIREBASE_CLIENT_EMAIL=${FIREBASE_CLIENT_EMAIL}
          FIREBASE_PRIVATE_KEY=${FIREBASE_PRIVATE_KEY}
          ENVEOF

      # Build the schema into the fresh local Postgres, then apply RLS.
      # drizzle.config has `strict: true`, so `drizzle-kit push` asks "execute
      # these statements?" — against an empty DB that's a big additive diff (all
      # CREATE TABLEs, no rename menus), so we answer it with `yes`. We do NOT use
      # `drizzle-kit push --force` (which also emits DISABLE ROW LEVEL SECURITY —
      # CLAUDE.md §2); `yes | push` keeps the safe no-force path. `set +o pipefail`
      # so `yes` getting SIGPIPE when push exits doesn't fail the pipeline (the
      # pipeline then reports push's own exit code). Then db-rls.mjs re-asserts
      # supabase/rls.sql and verifies zero-policy RLS. timeout = hang safety net.
      - name: Build schema (fresh local Postgres)
        timeout-minutes: 5
        run: |
          set +o pipefail
          yes | npx drizzle-kit push
          set -o pipefail
          node scripts/db-rls.mjs

      - name: Run integration tests
        run: npm run test:integration
