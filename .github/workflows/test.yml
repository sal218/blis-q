name: CI

on:
  pull_request:
    branches: ["**"]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fast-gate:
    name: Lint · Types · Unit Tests · Server Build
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/splitit_ci_placeholder
      SUPABASE_URL: https://placeholder.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
      SUPABASE_ANON_KEY: placeholder-anon-key-not-used-in-fast-gate
      SESSION_SECRET: ci-fast-gate-session-secret-at-least-32-chars
      RESEND_API_KEY: re_test_disabled
      INVITE_LINK_BASE: http://localhost:5000
      WEB_APP_URL: http://localhost:8081
      EXPO_PUBLIC_API_URL: http://localhost:5000
      FIREBASE_PROJECT_ID: test-project
      FIREBASE_CLIENT_EMAIL: test@test-project.iam.gserviceaccount.com
      FIREBASE_PRIVATE_KEY: "-----BEGIN RSA PRIVATE KEY-----\nMIIEowIBAAKCAQEA00000000000000000000000000000000000000000000000=\n-----END RSA PRIVATE KEY-----"
      ENABLE_BILL_SPLIT_FLOW: "false"
      GROUP_RESTORE_WINDOW_DAYS: "30"
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Create .env.test
        run: |
          cat > .env.test << ENVEOF
          DATABASE_URL=${DATABASE_URL}
          SUPABASE_URL=${SUPABASE_URL}
          SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
          SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
          SESSION_SECRET=${SESSION_SECRET}
          RESEND_API_KEY=${RESEND_API_KEY}
          INVITE_LINK_BASE=${INVITE_LINK_BASE}
          WEB_APP_URL=${WEB_APP_URL}
          EXPO_PUBLIC_API_URL=${EXPO_PUBLIC_API_URL}
          FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
          FIREBASE_CLIENT_EMAIL=${FIREBASE_CLIENT_EMAIL}
          FIREBASE_PRIVATE_KEY=${FIREBASE_PRIVATE_KEY}
          ENABLE_BILL_SPLIT_FLOW=${ENABLE_BILL_SPLIT_FLOW}
          GROUP_RESTORE_WINDOW_DAYS=${GROUP_RESTORE_WINDOW_DAYS}
          ENVEOF

      - name: Audit dependencies
        run: npm audit --audit-level=high --omit=dev
        continue-on-error: true

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run check:types

      - name: Unit tests
        run: npm test

      - name: App/server Jest tests (mocked, no DB)
        run: npm run test:jest:app:ci

      - name: Server build
        run: npm run server:build

  integration-tests:
    name: Integration Tests (Jest + real DB)
    runs-on: ubuntu-latest
    needs: fast-gate
    if: "github.actor != 'dependabot[bot]' && !contains(github.event.head_commit.message, '[skip integration]') && !contains(github.event.pull_request.title, '[skip integration]')"
    env:
      DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
      SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}
      SUPABASE_ANON_KEY: placeholder-anon-key-not-used-in-tests
      SESSION_SECRET: ci-test-session-secret-at-least-32-chars
      RESEND_API_KEY: re_test_disabled
      INVITE_LINK_BASE: http://localhost:5000
      WEB_APP_URL: http://localhost:8081
      EXPO_PUBLIC_API_URL: http://localhost:5000
      FIREBASE_PROJECT_ID: test-project
      FIREBASE_CLIENT_EMAIL: test@test-project.iam.gserviceaccount.com
      FIREBASE_PRIVATE_KEY: "-----BEGIN RSA PRIVATE KEY-----\nMIIEowIBAAKCAQEA00000000000000000000000000000000000000000000000=\n-----END RSA PRIVATE KEY-----"
      ENABLE_BILL_SPLIT_FLOW: "false"
      GROUP_RESTORE_WINDOW_DAYS: "30"

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Create .env.test
        run: |
          cat > .env.test << ENVEOF
          DATABASE_URL=${DATABASE_URL}
          SUPABASE_URL=${SUPABASE_URL}
          SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
          SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
          SESSION_SECRET=${SESSION_SECRET}
          RESEND_API_KEY=${RESEND_API_KEY}
          INVITE_LINK_BASE=${INVITE_LINK_BASE}
          WEB_APP_URL=${WEB_APP_URL}
          EXPO_PUBLIC_API_URL=${EXPO_PUBLIC_API_URL}
          FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
          FIREBASE_CLIENT_EMAIL=${FIREBASE_CLIENT_EMAIL}
          FIREBASE_PRIVATE_KEY=${FIREBASE_PRIVATE_KEY}
          ENABLE_BILL_SPLIT_FLOW=${ENABLE_BILL_SPLIT_FLOW}
          GROUP_RESTORE_WINDOW_DAYS=${GROUP_RESTORE_WINDOW_DAYS}
          ENVEOF

      - name: Apply DB migrations
        run: npm run db:migrate

      - name: Run integration tests
        run: npm run test:integration
